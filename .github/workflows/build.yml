name: Build Mod

on: [push, pull_request]

permissions:
  contents: write

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Add newest d8 build tool to PATH
      run: |
        echo "${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -n 1)" >> $GITHUB_PATH
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build mod jar (desktop + Android)
      run: |
        chmod +x ./gradlew
        ./gradlew deploy
    - name: Upload built jar file
      uses: actions/upload-artifact@v7
      with:
        archive: false
        name: Hide-Units
        path: build/libs/Hide-Units.jar
    # Mindustry's "import mod from GitHub" feature for Java mods downloads the jar
    # asset of the repo's latest release, so keep a rolling release up to date.
    - name: Update rolling release for in-game import
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest build
        body: Automatic build of the newest commit. In Mindustry, use Mods → Import mod → GitHub repository → `Vini230909/Hide-Units`.
        files: build/libs/Hide-Units.jar
